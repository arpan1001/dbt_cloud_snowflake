version: 2

sources:
  - name: jaffle_shop
    database: raw
    schema: jaffle_shop
    freshness:
          warn_after: {count: 12, period: day}
          error_after: {count: 24, period: day}
    loaded_at_field: _etl_loaded_at
    tables:
      - name: orders
      - name: customers
        freshness: null

  - name: stripe
    database: raw
    schema: stripe
    tables: 
      - name: payment
        freshness:
          warn_after: {count: 12, period: day}
          error_after: {count: 24, period: day}
        loaded_at_field: _batched_at
